<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Activation licence</title>
</head>
<body>

<h1>Paiement confirmé</h1>
<p id="status">Activation en cours...</p>

<script>
// ===============================
// MODULE 01 - GET SESSION ID
// ===============================
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");

// ===============================
// MODULE 02 - ACTIVATE
// ===============================
async function activate() {

    if (!sessionId) {
        document.getElementById("status").innerText = "Erreur : session_id manquant";
        return;
    }

    try {
        const response = await fetch(
            "https://TON-SERVER.onrender.com/activate-session",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    session_id: sessionId
                })
            }
        );

        const data = await response.json();

        if (data.licence) {
            document.getElementById("status").innerHTML =
                "Licence activée : <b>" + data.licence + "</b><br><br>" +
                "Type : " + data.type + "<br>" +
                "Machines : " + data.maxMachines + "<br>" +
                "Expiration : " + (data.expiresAt || "illimité");
        } else {
            document.getElementById("status").innerText =
                "Erreur : " + (data.error || "inconnue");
        }

    } catch (err) {
        document.getElementById("status").innerText = "Erreur serveur";
    }
}

// ===============================
// MODULE 03 - EXECUTE
// ===============================
activate();
</script>

</body>
</html>
