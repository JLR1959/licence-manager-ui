<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement réussi</title>

<style>
body{
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:60px;
  font-family:Arial;
}

.logo{
  width:140px;
  border-radius:50%;
  margin-bottom:20px;
}

h1{color:#22c55e;}

#status{
  margin-top:20px;
  font-size:18px;
}

.licence-box{
  margin-top:30px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.bloc{
  background:#111827;
  padding:12px 16px;
  border-radius:8px;
  font-weight:bold;
  letter-spacing:2px;
}

.copy-btn, .access-btn, .validate-btn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.access-btn{background:#22c55e;}

.input-email{
  margin-top:20px;
  padding:10px;
  width:260px;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<img src="logo_jlr.png" class="logo">

<h1>Paiement réussi ✅</h1>
<p id="status">Activation de votre licence...</p>

<div id="emailZone">
  <p>Entrez votre email utilisé pour le paiement :</p>
  <input id="emailInput" class="input-email" type="email"/>
  <br/>
  <button class="validate-btn" onclick="validerEmail()">Valider</button>
</div>

<div id="licenceBox" class="licence-box"></div>

<button id="copyBtn" class="copy-btn" style="display:none;">
Copier la clé
</button>

<br/>

<button id="accessBtn" class="access-btn" style="display:none;">
Accéder au logiciel
</button>

<script>

// ==============================
// MODULE 01 - CONFIG
// ==============================
const API = "https://licence-server-jlr-0jex.onrender.com";
const SAAS_URL = "https://jlr1959.github.io/VPIJLR-logiciel-client/";

// ==============================
// MODULE 02 - DEBUG
// ==============================
function log(msg){
  console.log("[DEBUG]", msg);
}

// ==============================
// MODULE 03 - AFFICHAGE CLE
// ==============================
function afficherCle(cle){
  const box = document.getElementById("licenceBox");
  box.innerHTML = "";

  cle.split("-").forEach(b=>{
    const div = document.createElement("div");
    div.className = "bloc";
    div.innerText = b;
    box.appendChild(div);
  });

  const btn = document.getElementById("copyBtn");
  btn.style.display = "inline-block";

  btn.onclick = ()=>{
    navigator.clipboard.writeText(cle);
    btn.innerText = "Copié ✔";
  };
}

// ==============================
// MODULE 04 - ACTIVER (FIX)
// ==============================
async function activer(email){

  document.getElementById("status").innerText = "Activation...";
  log("Email: " + email);

  try{

    const res = await fetch(API + "/activate?email=" + encodeURIComponent(email));

    if(!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const data = await res.json();

    log(data);

    if(!data.licence){
      throw new Error("Licence absente");
    }

    localStorage.setItem("user_email", email);
    localStorage.setItem("licence_key", data.licence);

    afficherCle(data.licence);

    document.getElementById("status").innerText =
      "Licence activée ✔";

    document.getElementById("emailZone").style.display = "none";

    const accessBtn = document.getElementById("accessBtn");
    accessBtn.style.display = "inline-block";

    accessBtn.onclick = ()=>{
      window.location.href = SAAS_URL;
    };

  }catch(err){
    console.error(err);
    document.getElementById("status").innerText =
      "❌ Erreur activation (voir console)";
  }
}

// ==============================
// MODULE 05 - VALIDATION
// ==============================
function validerEmail(){

  const email = document.getElementById("emailInput").value.trim();

  if(!email || !email.includes("@")){
    alert("Email invalide");
    return;
  }

  activer(email);
}

// ==============================
// MODULE 06 - AUTO LOGIN
// ==============================
window.onload = () => {

  const saved = localStorage.getItem("user_email");

  if(saved){
    activer(saved);
  }else{
    document.getElementById("status").innerText = "Entrez votre email";
  }
};

</script>

</body>
</html>
