<!-- ===============================
MODULE 05 - LICENCE DISPLAY
=============================== -->
<div id="licence-box" style="
  margin:40px auto;
  padding:25px;
  width:max-content;
  background:#0f172a;
  border:2px solid #1e40af;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  text-align:center;
  font-family:monospace;
">

  <div style="
    color:#94a3b8;
    font-size:14px;
    margin-bottom:15px;
    letter-spacing:1px;
  ">
    NUMÉRO DE LICENCE
  </div>

  <div id="licence-key" style="
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  ">
    <!-- blocs générés JS -->
  </div>

</div>

<!-- ===============================
MODULE 06 - SCRIPT LICENCE FORMAT
=============================== -->
<script>
(function(){

  const licence = localStorage.getItem("licence_key");

  const container = document.getElementById("licence-key");

  if(!licence){
    container.innerHTML = "<span style='color:#ef4444'>Aucune licence</span>";
    return;
  }

  // Exemple : ABC123-DEF456-...
  const parts = licence.split("-");

  parts.forEach(part => {

    const block = document.createElement("div");

    block.style = `
      background:#020617;
      padding:10px 14px;
      border:1px solid #334155;
      border-radius:6px;
      font-size:18px;
      color:#22c55e;
      letter-spacing:2px;
      font-weight:bold;
      min-width:80px;
    `;

    block.innerText = part;

    container.appendChild(block);

  });

})();
</script>
