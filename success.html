<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement réussi</title>

<style>
body{
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:60px;
  font-family:Arial;
}

.logo{
  width:140px;
  border-radius:50%;
  margin-bottom:20px;
}

h1{
  color:#22c55e;
}

#status{
  margin-top:20px;
  font-size:18px;
}

/* LICENCE */

.licence-box{
  margin-top:30px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.bloc{
  background:#111827;
  padding:12px 16px;
  border-radius:8px;
  font-weight:bold;
  letter-spacing:2px;
}

.copy-btn{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.copy-btn:hover{
  background:#1d4ed8;
}
</style>

</head>

<body>

<!-- ======================================================
MODULE 01 — LOGO
====================================================== -->

<img src="logo_jlr.png" class="logo">

<!-- ======================================================
MODULE 02 — TITRE
====================================================== -->

<h1>Paiement réussi ✅</h1>

<p id="status">Activation licence...</p>

<!-- ======================================================
MODULE 03 — LICENCE UI
====================================================== -->

<div id="licenceBox" class="licence-box"></div>

<button id="copyBtn" class="copy-btn" style="display:none;">
Copier la clé
</button>

<script>

/* ======================================================
MODULE 04 — CONFIG
====================================================== */

const API = "https://licence-server-jlr-0jex.onrender.com";

/* ======================================================
MODULE 05 — GET SESSION ID
====================================================== */

function getSessionId(){
  const params = new URLSearchParams(window.location.search);
  return params.get("session_id");
}

/* ======================================================
MODULE 06 — AFFICHAGE CLE
====================================================== */

function afficherCle(cle){

  const box = document.getElementById("licenceBox");
  box.innerHTML = "";

  const blocs = cle.split("-");

  blocs.forEach(b=>{
    const div = document.createElement("div");
    div.className = "bloc";
    div.innerText = b;
    box.appendChild(div);
  });

  const btn = document.getElementById("copyBtn");
  btn.style.display = "inline-block";

  btn.onclick = ()=>{
    navigator.clipboard.writeText(cle);
    btn.innerText = "Copié ✔";
  };
}

/* ======================================================
MODULE 07 — ACTIVATION
====================================================== */

async function activer(){

  const sessionId = getSessionId();

  if(!sessionId){
    document.getElementById("status").innerText =
      "❌ Session Stripe manquante";
    return;
  }

  try{

    // 1. récupérer email depuis Stripe via serveur
    const resSession = await fetch(API + "/session/" + sessionId);
    const sessionData = await resSession.json();

    const email = sessionData.email;

    if(!email){
      throw new Error("Email introuvable");
    }

    // 2. récupérer licence
    const res = await fetch(API + "/licence/" + email);

    if(!res.ok){
      throw new Error("Licence introuvable");
    }

    const data = await res.json();

    const cle = data.cle;

    localStorage.setItem("licence_key", cle);

    document.getElementById("status").innerText =
      "Licence activée ✔";

    afficherCle(cle);

  }catch(e){

    document.getElementById("status").innerText =
      "❌ " + e.message;

  }

}

/* ======================================================
MODULE 08 — START
====================================================== */

window.onload = activer;

</script>

</body>
</html>
