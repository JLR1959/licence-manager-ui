<!-- ===============================
MODULE 05 - LICENCE PREMIUM UI
=============================== -->
<div id="licence-card" style="
  margin:50px auto;
  padding:30px;
  width:max-content;
  background:linear-gradient(145deg,#020617,#0f172a);
  border:1px solid #1e293b;
  border-radius:14px;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  text-align:center;
  font-family:monospace;
  position:relative;
">

  <!-- TITRE -->
  <div style="
    color:#94a3b8;
    font-size:13px;
    margin-bottom:20px;
    letter-spacing:2px;
  ">
    LICENCE OFFICIELLE VPIJLR 2026
  </div>

  <!-- BLOCS -->
  <div id="licence-key" style="
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:20px;
  "></div>

  <!-- ACTIONS -->
  <div style="display:flex;gap:10px;justify-content:center;">

    <button id="copy-btn" style="
      background:#1e40af;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    ">
      Copier
    </button>

    <button id="toggle-btn" style="
      background:#334155;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    ">
      Masquer
    </button>

  </div>

</div>

<!-- ===============================
MODULE 06 - SCRIPT PREMIUM
=============================== -->
<script>
(function(){

  const licence = localStorage.getItem("licence_key");
  const container = document.getElementById("licence-key");
  const copyBtn = document.getElementById("copy-btn");
  const toggleBtn = document.getElementById("toggle-btn");

  if(!licence){
    container.innerHTML = "<span style='color:#ef4444'>Aucune licence</span>";
    return;
  }

  let visible = true;

  function render(){

    container.innerHTML = "";

    const parts = licence.split("-");

    parts.forEach(part => {

      const block = document.createElement("div");

      block.style = `
        background:#020617;
        padding:12px 16px;
        border:1px solid #334155;
        border-radius:8px;
        font-size:18px;
        color:#22c55e;
        letter-spacing:2px;
        font-weight:bold;
        min-width:85px;
        box-shadow:0 0 10px rgba(34,197,94,0.2);
        transition:all 0.2s;
      `;

      block.innerText = visible ? part : "••••••";

      container.appendChild(block);

    });

  }

  // ===============================
  // COPY
  // ===============================
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(licence);
    copyBtn.innerText = "✔ Copié";
    setTimeout(()=> copyBtn.innerText = "Copier", 1500);
  };

  // ===============================
  // TOGGLE VISIBILITY
  // ===============================
  toggleBtn.onclick = () => {
    visible = !visible;
    toggleBtn.innerText = visible ? "Masquer" : "Afficher";
    render();
  };

  render();

})();
</script>
